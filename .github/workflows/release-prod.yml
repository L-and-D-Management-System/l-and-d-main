name: Release Prod

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Set release variables
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"

          if [[ "$TAG_NAME" =~ ^(.+)-(v.+)$ ]]; then
            echo "RELEASE_SERVICE=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            echo "RELEASE_TAG=${BASH_REMATCH[2]}" >> $GITHUB_ENV
          else
            echo "Invalid tag format"
            exit 1
          fi

      # GHCR LOGIN (IMPORTANT FIX)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      # 🔥 FIXED RELEASE LOGIC (NO PULL)
      - name: Build & Release service
        run: |
          SERVICE="${RELEASE_SERVICE}"

          IMAGE_REPOSITORY=$(yq '.image.repository' helm/services/${SERVICE}/values-dev.yaml)

          echo "Releasing $SERVICE"
          echo "Repo: $IMAGE_REPOSITORY"

          # build directly (no dependency on dev image)
          docker build -t ${IMAGE_REPOSITORY}:${RELEASE_TAG} .

          docker push ${IMAGE_REPOSITORY}:${RELEASE_TAG}

          yq -i ".image.tag = \"${RELEASE_TAG}\"" \
            helm/services/${SERVICE}/values-prod.yaml

      - name: Commit & push Helm updates
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@bot.com"

          git add helm/services/${RELEASE_SERVICE}/values-prod.yaml
          git commit -m "release ${RELEASE_SERVICE} -> ${RELEASE_TAG}" || echo "No changes"

          git push origin HEAD:main

      - name: Notify
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI/CD Bot <${{ secrets.SMTP_USER }}>"
          subject: "Prod Release - ${{ job.status }}"
          body: |
            Release: ${{ github.event.release.tag_name }}
            Service: ${{ env.RELEASE_SERVICE }}
            Status: ${{ job.status }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
