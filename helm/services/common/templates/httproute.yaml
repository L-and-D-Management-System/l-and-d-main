apiVersion: gateway.networking.k8s.io/v1

kind: HTTPRoute

metadata:

  name: lnd-route

  namespace: {{ .Values.gateway.namespace }}

spec:

  parentRefs:

    - name: {{ .Values.gateway.name }}
 
  rules:
 
    # 🔹 AUTH SERVICE

    - matches:

        - path:

            type: PathPrefix

            value: /auth

      filters:

        - type: URLRewrite

          urlRewrite:

            path:

              type: ReplacePrefixMatch

              replacePrefixMatch: /

      backendRefs:

        - name: auth-svc

          port: 3001
 
    # 🔹 USER SERVICE

    - matches:

        - path:

            type: PathPrefix

            value: /users

      filters:

        - type: URLRewrite

          urlRewrite:

            path:

              type: ReplacePrefixMatch

              replacePrefixMatch: /

      backendRefs:

        - name: user-svc

          port: 3002
 
    # 🔹 TRAINING SERVICE

    - matches:

        - path:

            type: PathPrefix

            value: /trainings

      filters:

        - type: URLRewrite

          urlRewrite:

            path:

              type: ReplacePrefixMatch

              replacePrefixMatch: /

      backendRefs:

        - name: training-svc

          port: 3003
 
    # 🔹 ATTENDANCE SERVICE

    - matches:

        - path:

            type: PathPrefix

            value: /attendance

      filters:

        - type: URLRewrite

          urlRewrite:

            path:

              type: ReplacePrefixMatch

              replacePrefixMatch: /

      backendRefs:

        - name: attendance-svc

          port: 3004
 
    # 🔹 ASSETS (Don't rewrite these)

    - matches:

        - path:

            type: PathPrefix

            value: /assets

      backendRefs:

        - name: frontend-svc

          port: 80
 
    # 🔹 FRONTEND SPA FALLBACK (Rewrite /login, /dashboard, etc. to /)

    - matches:

        - path:

            type: PathPrefix

            value: /

      filters:

        - type: URLRewrite

          urlRewrite:

            path:

              type: ReplaceFullPath

              replaceFullPath: /

      backendRefs:

        - name: frontend-svc

          port: 80
 
