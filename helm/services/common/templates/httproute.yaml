apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lnd-routes
  namespace: {{ .Values.gateway.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.gateway.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /auth
    backendRefs:
    - name: auth-service
      port: 3001
  - matches:
    - path:
        type: PathPrefix
        value: /users
    backendRefs:
    - name: user-service
      port: 3002
  - matches:
    - path:
        type: PathPrefix
        value: /trainings
    backendRefs:
    - name: training-service
      port: 3003
  - matches:
    - path:
        type: PathPrefix
        value: /attendance
    backendRefs:
    - name: attendance-service
      port: 3004
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /assets
    backendRefs:
    - name: frontend
      port: 80
