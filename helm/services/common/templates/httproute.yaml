apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lnd-routes
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.gateway.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    backendRefs:
    - name: auth-service
      port: 3000
  - matches:
    - path:
        type: PathPrefix
        value: /api/user
    backendRefs:
    - name: user-service
      port: 3000
  - matches:
    - path:
        type: PathPrefix
        value: /api/training
    backendRefs:
    - name: training-service
      port: 3000
  - matches:
    - path:
        type: PathPrefix
        value: /api/attendance
    backendRefs:
    - name: attendance-service
      port: 3000
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80
