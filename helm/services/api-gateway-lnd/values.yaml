fullnameOverride: api-gateway-lnd
replicaCount: 1
image:
  repository: l-and-d-management-system/api-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3000

env:
  MONGO_URI: "mongodb://mongodb:27017/api-db"
  PORT: "3000"

secrets:
  JWT_SECRET: "your-jwt-secret-here"

