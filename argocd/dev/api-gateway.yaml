apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: landd-api-gateway-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/L-and-D-Management-System/l-and-d-main.git
    targetRevision: main
    path: helm/services/api-gateway
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ld-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
